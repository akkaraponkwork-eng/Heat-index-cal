<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="description" content="ระบบคำนวณดัชนีความร้อน สำหรับหน่วยฝึกทหารใหม่">
    <meta name="theme-color" content="#1a4731">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/svg+xml" href="icon.svg">
    <title>ดัชนีความร้อน</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <!-- Main App -->
    <div class="app">

        <!-- Hero Header -->
        <header class="app-header">
            <div class="header-bg-dots"></div>
            <div class="header-content">
                <div class="header-badge">กรมแพทย์ทหารบก</div>
                <div class="header-title-row">
                    <span class="header-thermo">🌡️</span>
                    <div>
                        <h1>ดัชนีความร้อน</h1>
                        <p>Heat Index Calculator</p>
                    </div>
                </div>
                <div class="header-datetime" id="live-datetime"></div>
            </div>

            <!-- Quick Flag Legend -->
            <div class="flag-legend">
                <div class="legend-item white"><span>⚪</span> &lt;27</div>
                <div class="legend-item green"><span>🟢</span> 27–32</div>
                <div class="legend-item yellow"><span>🟡</span> 33–40</div>
                <div class="legend-item red"><span>🔴</span> 41–51</div>
                <div class="legend-item black"><span>⚫</span> 52+</div>
            </div>
        </header>

        <!-- Form Card -->
        <div class="form-card">
            <div class="form-card-title">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line><polyline points="10 9 9 9 8 9"></polyline></svg>
                กรอกข้อมูล
            </div>
            <form id="calculator-form">

                <div class="field">
                    <label for="unit-name">หน่วยฝึก</label>
                    <input type="text" id="unit-name" placeholder="ชื่อหน่วย" autocomplete="off" value="พัน.บร.กบร.ศบบ."
                    >
                </div>

                <div class="field-row">
                    <div class="field">
                        <label for="dry-temp">อุณหภูมิแห้ง</label>
                        <div class="input-wrap">
                            <input type="number" id="dry-temp" step="0.1" inputmode="decimal" placeholder="37">
                            <span class="unit">°C</span>
                        </div>
                    </div>
                    <div class="field">
                        <label for="wet-temp">อุณหภูมิเปียก</label>
                        <div class="input-wrap">
                            <input type="number" id="wet-temp" step="0.1" inputmode="decimal" placeholder="28">
                            <span class="unit">°C</span>
                        </div>
                    </div>
                </div>

                <button type="submit" class="calc-btn" id="calc-btn">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M9 3H5a2 2 0 0 0-2 2v4m6-6h10a2 2 0 0 1 2 2v4M9 3v18m0 0h10a2 2 0 0 0 2-2v-4M9 21H5a2 2 0 0 1-2-2v-4m0 0h18"/></svg>
                    คำนวณดัชนีความร้อน
                </button>

            </form>
        </div>

    </div>

    <!-- Result Bottom Sheet -->
    <div id="sheet-overlay" class="sheet-overlay hidden">
        <div id="result-sheet" class="result-sheet">

            <!-- Sheet Handle -->
            <div class="sheet-handle"></div>

            <!-- Flag Banner -->
            <div id="flag-banner" class="flag-banner">
                <span id="flag-emoji" class="flag-emoji">⚪</span>
                <div class="flag-text">
                    <div class="flag-label">ธงสี</div>
                    <div id="flag-name" class="flag-name">ขาว</div>
                </div>
                <div class="hi-display">
                    <div class="hi-value"><span id="hi-val">--</span>°C</div>
                    <div class="hi-label">ดัชนีความร้อน</div>
                </div>
            </div>

            <!-- Stats Row -->
            <div class="stats-row">
                <div class="stat">
                    <div class="stat-num"><span id="rh-val">--</span>%</div>
                    <div class="stat-label">ความชื้นสัมพัทธ์</div>
                </div>
                <div class="stat-divider"></div>
                <div class="stat">
                    <div class="stat-num" id="dry-display">--°C</div>
                    <div class="stat-label">อุณหภูมิแห้ง</div>
                </div>
                <div class="stat-divider"></div>
                <div class="stat">
                    <div class="stat-num" id="wet-display">--°C</div>
                    <div class="stat-label">อุณหภูมิเปียก</div>
                </div>
            </div>

            <!-- Advice Box -->
            <div id="advice-box" class="advice-box">
                <div class="advice-icon">📋</div>
                <p id="advice-text" class="advice-text">--</p>
            </div>

            <!-- Copy Text Preview -->
            <div class="copy-section">
                <div class="copy-label">ข้อความสำหรับรายงาน</div>
                <textarea id="copy-text" readonly></textarea>
                <div class="btn-row">
                    <button id="copy-btn" class="copy-btn">
                        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect width="14" height="14" x="8" y="8" rx="2" ry="2"></rect><path d="M4 16c-1.1 0-2-.9-2-2V4c0-1.1.9-2 2-2h10c1.1 0 2 .9 2 2"></path></svg>
                        คัดลอกข้อความ
                    </button>
                    <button id="close-sheet" class="close-sheet-btn">ปิด</button>
                </div>
            </div>

        </div>
    </div>

    <!-- Toast -->
    <div id="toast" class="toast">✓ คัดลอกแล้ว</div>

    <script src="script.js"></script>
</body>
</html>
